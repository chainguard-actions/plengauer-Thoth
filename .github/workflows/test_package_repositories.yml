name: Test Package Repositories

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_run:
    workflows: ['Update Package Repository']
    types:
      - completed
  push:
    paths:
      - .github/workflows/test_package_repositories.yml

jobs:
  test-apt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - env:
          GITHUB_REPOSITORY_OWNER_VAL: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME_VAL: ${{ github.event.repository.name }}
        run: |
          echo "deb [arch=all] https://$GITHUB_REPOSITORY_OWNER_VAL.github.io/$GITHUB_REPOSITORY_NAME_VAL stable main" | sudo tee /etc/apt/sources.list.d/otel.list
          sudo apt-get update --allow-insecure-repositories
          sudo apt-get install -y --allow-unauthenticated opentelemetry-shell
      - run: |
          type otel.sh
      - env:
          GITHUB_TOKEN_VAL: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_tag="$(curl --fail --silent --show-error  --header "Accept: application/vnd.github+json"  --header "Authorization: Bearer $GITHUB_TOKEN_VAL" https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest | jq -r '.tag_name')"
          latest_version="${latest_tag#v}"
          installed_version="$(dpkg-query -W -f='${Version}' opentelemetry-shell | cut -d - -f 1)"
          echo "latest_version=$latest_version"
          echo "installed_version=$installed_version"
          [ "$installed_version" = "$latest_version" ]
