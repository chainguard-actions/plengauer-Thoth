name: Test stub action exits with failure
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
      - name: Assert action failed as expected
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (it is a stub that always exits 1), but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly exited with failure as expected for a stub"
